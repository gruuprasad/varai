<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>varai — System Model & Interaction Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand-wrap">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><path d="M12 3v3m0 12v3M3 12h3m12 0h3"/></svg>
        </span>
        <span class="brand">varai</span>
      </div>
      <div class="repo-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span class="repo-path" id="repo-path">{{REPO_PATH}}</span>
      </div>
      <div class="topbar-stats" id="topbar-stats"></div>
      <div class="topbar-status">
        <span class="status-dot scanning" id="status-dot"></span>
        <span id="status-text">Scanning...</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme" aria-label="Toggle theme">
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <nav id="sidebar-nav"></nav>
      </aside>
      <main class="main">
        <div class="view-stack" id="view-stack">
          <!-- Grid Layer -->
          <div class="view-layer grid-layer active" id="grid-layer">
            <div class="search-wrap">
              <div class="search-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </div>
              <input class="search" id="search" type="text" placeholder="Find anything in this system..." autocomplete="off" spellcheck="false">
              <button class="search-clear" id="search-clear" title="Clear search" hidden aria-label="Clear search">✕</button>
              <span class="search-count" id="search-count"></span>
            </div>
            <div class="bento-grid" id="bento-grid">
              <div class="empty-state">
                <div class="empty-spinner"></div>
                <span>Scanning repository...</span>
              </div>
            </div>
          </div>

          <!-- Focus Layer -->
          <div class="view-layer focus-layer" id="focus-layer">
            <header class="focus-topbar">
              <button class="back-btn" id="back-btn" aria-label="Back to grid">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span>Back to List</span>
              </button>
            </header>
            <div class="focus-content" id="focus-content">
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
